<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MrSoul — Store outreach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white: #ffffff;
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --border-strong: #d4d4d4;
      --text: #1a1a1a;
      --text-secondary: #5c5c5c;
      --muted: #8a8a8a;
      --red: #c41e3a;
      --red-dark: #9e1830;
      --red-light: #fdf2f4;
      --red-muted: rgba(196, 30, 58, 0.08);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
      --radius: 10px;
      --radius-sm: 6px;
      --font: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Top bar */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.02em;
    }
    .brand h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .brand span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 1px;
    }
    .topbar-nav a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .topbar-nav a:hover {
      color: var(--red);
      background: var(--red-muted);
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 24px 56px;
    }

    /* API key strip */
    .key-strip {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .key-strip .field { flex: 1; min-width: 220px; }
    .key-strip label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .alert {
      font-size: 13px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }
    .alert.show { display: block; }
    .alert.ok {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .alert.err {
      background: var(--red-light);
      color: var(--red-dark);
      border: 1px solid rgba(196, 30, 58, 0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-head::before {
      content: "";
      width: 3px;
      height: 18px;
      background: var(--red);
      border-radius: 2px;
    }
    .card-head h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.55;
    }
    .hint code {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--red-dark);
      border: 1px solid var(--border);
    }

    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      background: var(--white);
      border: 1px solid var(--border-strong);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-muted);
    }
    textarea {
      min-height: 96px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) {
      .row, .row3 { grid-template-columns: 1fr; }
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      cursor: pointer;
      margin: 0;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    button.primary {
      background: var(--red);
      color: white;
    }
    button.primary:hover {
      background: var(--red-dark);
    }
    button.secondary {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border-strong);
    }
    button.secondary:hover {
      border-color: var(--red);
      color: var(--red);
    }
    button.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      padding: 10px 12px;
    }
    button.ghost:hover { color: var(--red); }
    button.danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(196, 30, 58, 0.35);
      padding: 6px 12px;
      font-size: 12px;
    }
    button.danger:hover {
      background: var(--red-light);
    }
    button.sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    tbody td {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text-secondary);
    }
    tbody tr:hover td {
      background: #fcfcfc;
    }
    tbody td:first-child {
      font-weight: 500;
      color: var(--text);
    }
    tbody code {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red-dark);
      background: var(--red-light);
      padding: 3px 8px;
      border-radius: 4px;
    }
    .name-cell strong {
      display: block;
      color: var(--text);
      font-weight: 500;
    }
    .name-cell span {
      font-size: 12px;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .pill.on {
      background: var(--red-light);
      color: var(--red-dark);
    }
    .pill.off {
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">MS</div>
        <div>
          <h1>Store outreach</h1>
          <span>Daily Slack messages · MrSoul</span>
        </div>
      </div>
      <nav class="topbar-nav">
        <a href="/dashboard">← Operations</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="key-strip">
      <div class="field">
        <label for="apiKey">API key</label>
        <input id="apiKey" type="password" placeholder="Same as API_KEY in environment" autocomplete="off" />
      </div>
      <button type="button" class="primary" id="saveKeyBtn">Save key</button>
    </div>

    <div id="status" class="alert"></div>

    <div class="grid">
      <div class="card">
        <div class="card-head"><h2>Schedule</h2></div>
        <p class="hint" id="scheduleHint">Loading…</p>
        <label class="check-row">
          <input type="checkbox" id="enabled" />
          Enable daily automated messages
        </label>
        <div class="row3">
          <div>
            <label class="field-label" for="hour">Hour</label>
            <input id="hour" type="number" min="0" max="23" />
          </div>
          <div>
            <label class="field-label" for="minute">Minute</label>
            <input id="minute" type="number" min="0" max="59" />
          </div>
          <div>
            <label class="field-label" for="timezone">Timezone</label>
            <input id="timezone" value="Asia/Kolkata" />
          </div>
        </div>
        <label class="check-row">
          <input type="checkbox" id="pinMessages" checked />
          Pin message in each DM
        </label>
        <label class="field-label" for="messageTemplate">Message template</label>
        <textarea id="messageTemplate"></textarea>
        <p class="hint">
          Variables:
          <code>{{name}}</code>
          <code>{{storeId}}</code>
          <code>{{storeLocation}}</code>
          <code>{{userName}}</code>
          <code>{{phone}}</code>
          <code>{{email}}</code>
        </p>
        <div class="btn-row">
          <button type="button" class="primary" id="saveConfigBtn">Save schedule</button>
          <button type="button" class="secondary" id="runNowBtn">Run now</button>
          <button type="button" class="secondary" id="runForceBtn">Force all</button>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Store owner</h2></div>
        <input type="hidden" id="editMode" value="" />
        <label class="field-label" for="storeId">Store ID</label>
        <input id="storeId" type="text" placeholder="STR-001" />
        <label class="field-label" for="storeLocation">Location</label>
        <input id="storeLocation" type="text" placeholder="Mumbai — Bandra" />
        <div class="row">
          <div>
            <label class="field-label" for="userName">Slack username</label>
            <input id="userName" type="text" placeholder="rahul.store" />
          </div>
          <div>
            <label class="field-label" for="name">Full name</label>
            <input id="name" type="text" placeholder="Rahul Sharma" />
          </div>
        </div>
        <div class="row">
          <div>
            <label class="field-label" for="phone">Phone</label>
            <input id="phone" type="text" placeholder="+91 …" />
          </div>
          <div>
            <label class="field-label" for="email">Email</label>
            <input id="email" type="email" placeholder="name@thesouledstore.com" />
          </div>
        </div>
        <label class="check-row">
          <input type="checkbox" id="active" checked />
          Active — include in daily sends
        </label>
        <div class="btn-row">
          <button type="button" class="primary" id="saveOwnerBtn">Save owner</button>
          <button type="button" class="ghost" id="clearFormBtn">Clear</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h2>All store owners</h2></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Location</th>
              <th>Contact</th>
              <th>Email</th>
              <th>Last sent</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="ownersBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API = '/dashboard/api/store-outreach';
    const statusEl = document.getElementById('status');
    const apiKeyInput = document.getElementById('apiKey');

    function getKey() {
      return apiKeyInput.value.trim() || localStorage.getItem('mrsoul_api_key') || '';
    }

    function saveKey() {
      const k = apiKeyInput.value.trim();
      if (k) localStorage.setItem('mrsoul_api_key', k);
      toast('API key saved', true);
    }

    function toast(msg, ok) {
      statusEl.textContent = msg;
      statusEl.className = 'alert show ' + (ok ? 'ok' : 'err');
      setTimeout(() => statusEl.classList.remove('show'), 5000);
    }

    async function api(path, opts = {}) {
      const key = getKey();
      const headers = { 'Content-Type': 'application/json' };
      if (key) headers['X-Api-Key'] = key;
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json.error || res.statusText);
      return json;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadConfig() {
      const { data } = await api('/config');
      document.getElementById('enabled').checked = data.enabled;
      document.getElementById('hour').value = data.hour;
      document.getElementById('minute').value = data.minute;
      document.getElementById('timezone').value = data.timezone;
      document.getElementById('pinMessages').checked = data.pinMessages;
      document.getElementById('messageTemplate').value = data.messageTemplate;
      document.getElementById('scheduleHint').textContent =
        data.nextRunHint + ' · ' + data.cronExpression +
        (data.lastRunSummary ? ' · Last run: ' + data.lastRunSummary : '');
    }

    async function loadOwners() {
      const { data } = await api('/owners');
      const tbody = document.getElementById('ownersBody');
      if (!data.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No store owners yet — add one above</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(o => {
        const last = o.lastOutreachDate
          ? escapeHtml(o.lastOutreachDate) + (o.lastOutreachError ? ' · failed' : '')
          : '—';
        return '<tr>' +
          '<td><code>' + escapeHtml(o.storeId) + '</code></td>' +
          '<td>' + escapeHtml(o.storeLocation) + '</td>' +
          '<td class="name-cell"><strong>' + escapeHtml(o.name) + '</strong><span>@' + escapeHtml(o.userName) + '</span></td>' +
          '<td>' + escapeHtml(o.email) + '</td>' +
          '<td>' + last + '</td>' +
          '<td><div class="actions">' +
            '<span class="pill ' + (o.active ? 'on' : 'off') + '">' + (o.active ? 'Active' : 'Off') + '</span>' +
            '<button type="button" class="secondary sm" data-edit="' + escapeHtml(o.storeId) + '">Edit</button>' +
            '<button type="button" class="danger sm" data-del="' + escapeHtml(o.storeId) + '">Delete</button>' +
          '</div></td></tr>';
      }).join('');

      tbody.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          const o = data.find(x => x.storeId === btn.getAttribute('data-edit'));
          if (!o) return;
          document.getElementById('editMode').value = o.storeId;
          document.getElementById('storeId').value = o.storeId;
          document.getElementById('storeId').disabled = true;
          document.getElementById('storeLocation').value = o.storeLocation;
          document.getElementById('userName').value = o.userName;
          document.getElementById('name').value = o.name;
          document.getElementById('phone').value = o.phone || '';
          document.getElementById('email').value = o.email;
          document.getElementById('active').checked = o.active;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      tbody.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remove ' + btn.getAttribute('data-del') + '?')) return;
          try {
            await api('/owners/' + encodeURIComponent(btn.getAttribute('data-del')), { method: 'DELETE' });
            toast('Store owner removed', true);
            await loadOwners();
          } catch (e) { toast(e.message, false); }
        });
      });
    }

    function clearOwnerForm() {
      document.getElementById('editMode').value = '';
      document.getElementById('storeId').disabled = false;
      ['storeId','storeLocation','userName','name','phone','email'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('active').checked = true;
    }

    document.getElementById('saveKeyBtn').addEventListener('click', saveKey);
    document.getElementById('clearFormBtn').addEventListener('click', clearOwnerForm);

    document.getElementById('saveConfigBtn').addEventListener('click', async () => {
      try {
        await api('/config', {
          method: 'PUT',
          body: JSON.stringify({
            enabled: document.getElementById('enabled').checked,
            hour: Number(document.getElementById('hour').value),
            minute: Number(document.getElementById('minute').value),
            timezone: document.getElementById('timezone').value,
            pinMessages: document.getElementById('pinMessages').checked,
            messageTemplate: document.getElementById('messageTemplate').value,
          }),
        });
        toast('Schedule saved', true);
        await loadConfig();
      } catch (e) { toast(e.message, false); }
    });

    document.getElementById('saveOwnerBtn').addEventListener('click', async () => {
      const body = {
        storeId: document.getElementById('storeId').value.trim(),
        storeLocation: document.getElementById('storeLocation').value.trim(),
        userName: document.getElementById('userName').value.trim(),
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        active: document.getElementById('active').checked,
      };
      const editId = document.getElementById('editMode').value;
      try {
        if (editId) {
          await api('/owners/' + encodeURIComponent(editId), { method: 'PUT', body: JSON.stringify(body) });
        } else {
          await api('/owners', { method: 'POST', body: JSON.stringify(body) });
        }
        toast('Store owner saved', true);
        clearOwnerForm();
        await loadOwners();
      } catch (e) { toast(e.message, false); }
    });

    async function runNow(force) {
      try {
        const { data } = await api('/run-now', {
          method: 'POST',
          body: JSON.stringify({ force }),
        });
        toast('Sent ' + data.sent + ' · skipped ' + data.skipped + ' · failed ' + data.failed, data.failed === 0);
        await loadConfig();
        await loadOwners();
      } catch (e) { toast(e.message, false); }
    }

    document.getElementById('runNowBtn').addEventListener('click', () => runNow(false));
    document.getElementById('runForceBtn').addEventListener('click', () => runNow(true));

    apiKeyInput.value = localStorage.getItem('mrsoul_api_key') || '';

    (async () => {
      try {
        await loadConfig();
        await loadOwners();
      } catch (e) {
        toast('Could not load — save your API key above', false);
      }
    })();
  </script>
</body>
</html>
