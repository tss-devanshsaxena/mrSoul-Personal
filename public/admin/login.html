<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — MrSoul Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/assets/admin.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="mark">MS</div>
      <h1>MrSoul Admin</h1>
      <p>Sign in to manage store outreach</p>
    </div>
    <div id="alert" class="alert"></div>
    <form id="loginForm">
      <label class="field-label" for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username" required />
      <label class="field-label" for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required />
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Sign in</button>
    </form>
    <p class="hint" style="margin-top:20px;margin-bottom:0;text-align:center">
      Uses <code>DASHBOARD_USERNAME</code> and <code>DASHBOARD_PASSWORD</code> from your server environment.
    </p>
  </div>
  <script src="/admin/assets/admin.js"></script>
  <script>
    (async () => {
      if (await Admin.checkAuth()) {
        const next = new URLSearchParams(location.search).get('next') || '/admin/index.html';
        location.href = next;
        return;
      }
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alert = document.getElementById('alert');
        try {
          await Admin.login(
            document.getElementById('username').value.trim(),
            document.getElementById('password').value
          );
          const next = new URLSearchParams(location.search).get('next') || '/admin/index.html';
          location.href = next;
        } catch (err) {
          Admin.toast(alert, err.message === 'INVALID_CREDENTIALS' ? 'Invalid username or password' : err.message, false);
        }
      });
    })();
  </script>
</body>
</html>
